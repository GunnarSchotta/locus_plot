# Example track config — MYC super-enhancer locus (hg38, chr8:127,700,000–128,050,000)
#
# Run after downloading BigWig files:
#   bash example/download_bw.sh
#
# Then generate the figure:
#   python locus_plot.py \
#       --region chr8:127700000-128050000 \
#       --config example/tracks.ini \
#       --out example/output.pdf

[_global]
scalebar  = 50000
highlight = 127735000-127743000
title     = MYC locus — H3K27ac (GM12878 vs K562)

# ── Signal tracks (BigWig) ────────────────────────────────────────────────────

[GM12878 H3K27ac]
type   = bigwig
file   = example/data/GM12878_H3K27ac_fc.bw
color  = #2166ac
height = 1.5
ylim   = 0,15
group  = H3K27ac

[K562 H3K27ac]
type   = bigwig
file   = example/data/K562_H3K27ac_fc.bw
color  = #d6604d
height = 1.5
ylim   = 0,15
group  = H3K27ac

# ── Annotation tracks (BED) ───────────────────────────────────────────────────

[Repeats]
type       = bed
file       = example/data/repeats.bed
color      = #555555
height     = 0.2
show_names = false

[CTCF sites]
type   = ticks
file   = example/data/ctcf_sites.bed
color  = #1a7c2a
height = 0.2

[Genes]
type   = genes
file   = example/data/genes.bed12
color  = #111111
height = 0.3

[H3K27ac peaks]
type      = bed
file      = example/data/peaks.bed
color     = #aaaaaa
color_col = 5
color_map  = GM12878_only:#2166ac,K562_only:#d6604d,shared:#7B4F9E
show_names = false
height     = 0.2
group     = Peaks
