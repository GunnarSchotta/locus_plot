# dynseq example — toy per-base importance scores at a CTCF site
# (hg38, chr8:127,729,875-127,729,975, inside the CTCF_1 site from tracks.ini)
#
# Setup:
#   python example/fetch_fasta.py
#   python example/make_dynseq_scores.py
#
# Then generate the figure:
#   python locus_plot.py \
#       --region chr8:127729875-127729975 \
#       --config example/tracks_dynseq.ini \
#       --out example/dynseq_output.png --dpi 150

[_global]
title = Toy per-base importance scores (CTCF site)

[Contribution scores]
type   = dynseq
file   = example/data/ctcf_motif_scores.bw
fasta  = example/data/chr8.fa
height = 1.4
